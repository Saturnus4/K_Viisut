<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Valitse käyttäjä</title>

<style> 
body { 
	text-align: center; 
	font-family: Arial, sans-serif; 
} 

button {
    font-size: 25px;      /* bigger text */
    padding: 15px 25px;   /* more space inside */
    margin: -10px 0;       /* space between buttons */
    cursor: pointer;      /* nicer UX */
}

body {
    margin: 0;
    padding: 0;
    text-align: center;

    background-image: url("/static/Konnat5.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2); /* adjust */
    z-index: -1;
}
</style>

</head>
<body style="text-align:center;">

<h1>Valitse käyttäjä</h1>

{% for user in users %}
    <p>
        <a href="/set-user/{{ user }}">
            <button>{{ user }}</button>
        </a>
    </p>
{% endfor %}

</body>
</html>
