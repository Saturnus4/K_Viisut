<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sovellus</title>

<style> 
body { 
	text-align: center; 
	font-family: Arial, sans-serif; 
} 

ul { 
	list-style-type: none; padding: 0; 
} 

.song-item { 
border: 1px solid black; 
padding: 10px; 
margin: 20px auto; 
width: 300px; 
background-color: #f9f9f9; 
cursor: grab; 
} /* Dragged element (the one following cursor) */ 


.drag-ghost { 
opacity: 1; 
background-color: white; 
border: 2px solid #007BFF; 
box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5); 
transform: scale(1.05); 
z-index: 1000; 
} /* Original element fades */ 

.sortable-chosen { 
opacity: 0.3; 
} 

button { 
margin-left: 10px; 
padding: 5px 10px; 
} 

</style>

</head>

<body style="text-align:center;">

<h2>Kilppariviisut</h2>

<h3>Kappaleet</h3>

<ul id="song-list" style="list-style-type: none; padding: 0;">
    {% for song in songs %}
        <li data-id="{{ song.id }}" class="song-item">
            {{ song.title }}
            <button onclick="playSong('{{ song.file }}')">▶</button>
        </li>
    {% endfor %}
</ul>

<button onclick="saveRanking()">Tallenna ranking</button>

<script>
function playSong(file) {
    new Audio("/static/" + file).play();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script>
new Sortable(document.getElementById("song-list"), {
    animation: 150,
    ghostClass: "drag-ghost",
    chosenClass: "drag-chosen",
    dragClass: "drag-dragging"
});</script>

<script>
function saveRanking() {
    const items = document.querySelectorAll("#song-list li");

    const ranking = Array.from(items).map(item =>
        parseInt(item.dataset.id)
    );

    fetch("/save-ranking", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ ranking: ranking })
    })
    .then(response => response.json())
    .then(data => {
        alert("Tallennettu!");
        console.log(data);
    })
    .catch(error => {
        console.error("Error:", error);
    });
}
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    fetch("/get-ranking")
    .then(response => response.json())
    .then(data => {
        if (data.ranking && data.ranking.length > 0) {
            const songList = document.getElementById("song-list");
            const items = Array.from(songList.children);

            // Build a map of song id → li element
            const itemMap = {};
            items.forEach(item => {
                itemMap[item.dataset.id] = item;
            });

            // Append items in saved order
            data.ranking.forEach(id => {
                if (itemMap[id]) {
                    songList.appendChild(itemMap[id]);
                }
            });
        }
    })
    .catch(error => {
        console.error("Error loading ranking:", error);
    });
});
</script>

</body>
</html>
