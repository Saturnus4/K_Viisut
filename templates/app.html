<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sovellus</title>

<style> 

body {
    text-align: center;
    font-family: Arial, sans-serif;

    margin: 0;
    padding: 0 0 50px 0; /* padding-bottom for space under button */

    background-image: url("/static/Polku.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: block; /* default is fine */
}

/* allow page to scroll */
html, body {
    min-height: 100%;
}

.page {
    display: flex;
    justify-content: center; /* center the whole thing */
    align-items: flex-start;
    gap: 40px;
}

/* Main content stays centered */
.main {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Right-side buttons */
.sidebar {
    position: fixed;
    right: 20px;
    top: 100px;

    display: flex;
    flex-direction: column;
    gap: 10px;
}

.side-buttons {
    position: fixed;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;

    z-index: 9999; 
}

.side-buttons button {
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
}

#song-list {
    padding: 0;
    margin: 0 auto;
    width: 360px;
}

.rank {
    width: 35px;
    text-align: right;
    font-weight: bold;
    font-size: 18px;
    margin-right: 10px;
}

.flag {
    width: 30px;
    height: 20px;
    margin-right: 10px;
}

.artist {
    font-weight: bold;
}

.title {
    font-size: 12px;
    color: #555;
}

.points {
    width: 40px;
    text-align: right;
    font-size: 20px;
    font-weight: bold;
    margin-right: 10px;
}

button { 
padding: 5px 10px; 
font-size: 16px;
} 

.right {
    display: flex;
    align-items: center;
    gap: 10px;
margin-left: auto;
}

.left {
    display: flex;
    align-items: center;
}

.text {
    text-align: left;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2); /* adjust */
    z-index: -1;
}

ul { 
	list-style-type: none; padding: 0; 
} 

.song-item { 
display: flex;
align-items: center;
gap: 10px;
border: 1px solid black; 
padding: 10px; 
margin: 4px auto; 
width: 360px; 
background-color: #f9f9f9; 
cursor: grab; 
transition: background-color 0.2s;

} /* Dragged element (the one following cursor) */ 


.song-item.gold {
    background-color: #ffd700;
}

.song-item.silver {
    background-color: #c0c0c0;
}

.song-item.bronze {
    background-color: #cd7f32;
}

.drag-ghost { 
opacity: 1; 
background-color: white; 
border: 2px solid #007BFF; 
box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6); 
transform: scale(1.05); 
z-index: 1000; 
} /* Original element fades */ 

.sortable-chosen { 
background-color: #ddd;
opacity: 0.5; 
} 



.song-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex: 1;

    border: 1px solid black;
    padding: 10px;
    background-color: #f9f9f9;
}

.song-info {
    flex: 1;
    text-align: left;
}

</style>

</head>

<body style="text-align:center;">

<div class="page">

    <div class="main">

<h2>Kilppariviisut</h2>

<h3>Kappaleet</h3>

<ul id="song-list" style="list-style-type: none; padding: 0;">
    {% for song in songs %}
        <li data-id="{{ song.id }}" class="song-item">

    <div class="rank">{{ loop.index }}.</div>

    <div class="song-content">

        <div class="left">
            <img class="flag" src="/static/{{ song.country }}">

            <div class="text">
		<div class="artist">{{ song.artist }}</div>
                <div class="title">{{ song.title }}</div>
                
            </div>
        </div>

        <div class="right">
            <span class="points"></span>
            <button onclick="toggleSong(this, '{{ song.file }}')">▶</button>
        </div>

    </div>

</li>
    {% endfor %}
</ul>

<button onclick="saveRanking()">Tallenna</button>

    </div>

   

<div class="side-buttons">

    <button onclick="window.location.href='/results'">
        Yhteispisteet
    </button>

    {% for u in users %}
        {% if u != user %}
            <button onclick="window.location.href='/user-results/{{ u }}'">
                {{ u }}
            </button>
        {% endif %}
    {% endfor %}

</div>

</div>

<script>
const POINTS = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];
</script>

<script>
function updateRanks() {
    const items = document.querySelectorAll("#song-list li");

    items.forEach((item, index) => {
        const rankSpan = item.querySelector(".rank");
        const pointsSpan = item.querySelector(".points");

        // Rank number
        rankSpan.textContent = (index + 1) + ". ";

        // Points
        pointsSpan.textContent = index < POINTS.length ? POINTS[index] : "";

        // Apply medal colors to OUTER box
        item.classList.remove("gold", "silver", "bronze");

        if (index === 0) item.classList.add("gold");
        else if (index === 1) item.classList.add("silver");
        else if (index === 2) item.classList.add("bronze");
    });
}
</script>

<script>
let currentAudio = null;
let currentButton = null;

function toggleSong(button, file) {
    // If clicking the same button → toggle pause
    if (currentAudio && currentButton === button) {
        if (!currentAudio.paused) {
            currentAudio.pause();
            button.textContent = "▶";
        } else {
            currentAudio.play();
            button.textContent = "⏸";
        }
        return;
    }

    // If another song is playing → stop it
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;

        if (currentButton) {
            currentButton.textContent = "▶";
        }
    }

    // Start new song
    currentAudio = new Audio("/static/" + file);
    currentButton = button;

    currentAudio.play();
    button.textContent = "⏸";

    // When song ends → reset button
    currentAudio.onended = () => {
        button.textContent = "▶";
        currentAudio = null;
        currentButton = null;
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script>
new Sortable(document.getElementById("song-list"), {
    animation: 200,
    ghostClass: "drag-ghost",
    chosenClass: "sortable-chosen",
    dragClass: "drag-dragging",

    onEnd: function () {
        updateRanks();   // 👈 update numbers after drag
    }

});</script>

<script>
function saveRanking() {
    const items = document.querySelectorAll("#song-list li");

    const ranking = Array.from(items).map(item =>
        parseInt(item.dataset.id)
    );

    fetch("/save-ranking", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ ranking: ranking })
    })
    .then(response => response.json())
    .then(data => {
        alert("Tallennettu!");
        console.log(data);
    })
    .catch(error => {
        console.error("Error:", error);
    });
}
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    updateRanks();   
    fetch("/get-ranking")
    .then(response => response.json())
    .then(data => {
        if (data.ranking && data.ranking.length > 0) {
            const songList = document.getElementById("song-list");
            const items = Array.from(songList.children);

            // Build a map of song id → li element
            const itemMap = {};
            items.forEach(item => {
                itemMap[item.dataset.id] = item;
            });

            // Append items in saved order
            data.ranking.forEach(id => {
                if (itemMap[id]) {
                    songList.appendChild(itemMap[id]);
                }
            });
	updateRanks();
        }
    })
    .catch(error => {
        console.error("Error loading ranking:", error);
    });
});
</script>

</body>
</html>
