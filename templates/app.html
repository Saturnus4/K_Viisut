<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sovellus</title>

<style> 

body { 
	text-align: center; 
	font-family: Arial, sans-serif; 
} 

body {
    margin: 0;
    padding: 0;
    text-align: center;

    background-image: url("/static/Polku.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.rank {
    width: 30px;
    font-weight: bold;
    font-size: 18px;
    text-align: right;
}

.points {
    width: 40px;
    text-align: right;
    font-size: 20px;
    font-weight: bold;
    margin-right: 10px;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2); /* adjust */
    z-index: -1;
}

ul { 
	list-style-type: none; padding: 0; 
} 

.song-item { 
display: flex;
align-items: center;
gap: 10px;
border: 1px solid black; 
padding: 10px; 
margin: 4px auto; 
width: 300px; 
background-color: #f9f9f9; 
cursor: grab; 
transition: background-color 0.2s, transform 0.2s;
} /* Dragged element (the one following cursor) */ 


.gold {
    background-color: #ffd700; /* gold */
}

.silver {
    background-color: #c0c0c0; /* silver */
}

.bronze {
    background-color: #cd7f32; /* bronze */
}

.drag-ghost { 
opacity: 1; 
background-color: white; 
border: 2px solid #007BFF; 
box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6); 
transform: scale(1.05); 
z-index: 1000; 
} /* Original element fades */ 

.sortable-chosen { 
background-color: #ddd;
opacity: 0.5; 
} 

button { 
padding: 5px 10px; 
font-size: 16px;
} 

.song-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex: 1;

    border: 1px solid black;
    padding: 10px;
    background-color: #f9f9f9;
}

.song-info {
    flex: 1;
    text-align: left;
}

</style>

</head>

<body style="text-align:center;">

<h2>Kilppariviisut</h2>

<h3>Kappaleet</h3>

<ul id="song-list" style="list-style-type: none; padding: 0;">
    {% for song in songs %}
        <li data-id="{{ song.id }}" class="song-item">
    <span class="rank"></span>

    <div class="song-content">
        <span class="song-info">{{ song.title }}</span>
        <span class="points"></span>
        <button onclick="toggleSong(this, '{{ song.file }}')">▶</button>
    </div>
</li>
    {% endfor %}
</ul>

<button onclick="saveRanking()">Tallenna</button>

<script>
const POINTS = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];
</script>

<script>
function updateRanks() {
    const items = document.querySelectorAll("#song-list li");

    items.forEach((item, index) => {
        const rankSpan = item.querySelector(".rank");
        const pointsSpan = item.querySelector(".points");

        // Rank number
        rankSpan.textContent = (index + 1) + ". ";

        // Points
        if (index < POINTS.length) {
            pointsSpan.textContent = POINTS[index];
        } else {
            pointsSpan.textContent = "";
        }

        // Remove previous classes
        item.classList.remove("gold", "silver", "bronze");

        // Add top 3 highlighting
        if (index === 0) item.classList.add("gold");
        else if (index === 1) item.classList.add("silver");
        else if (index === 2) item.classList.add("bronze");
    });
}
</script>

<script>
let currentAudio = null;
let currentButton = null;

function toggleSong(button, file) {
    // If clicking the same button → toggle pause
    if (currentAudio && currentButton === button) {
        if (!currentAudio.paused) {
            currentAudio.pause();
            button.textContent = "▶";
        } else {
            currentAudio.play();
            button.textContent = "⏸";
        }
        return;
    }

    // If another song is playing → stop it
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;

        if (currentButton) {
            currentButton.textContent = "▶";
        }
    }

    // Start new song
    currentAudio = new Audio("/static/" + file);
    currentButton = button;

    currentAudio.play();
    button.textContent = "⏸";

    // When song ends → reset button
    currentAudio.onended = () => {
        button.textContent = "▶";
        currentAudio = null;
        currentButton = null;
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script>
new Sortable(document.getElementById("song-list"), {
    animation: 150,
    ghostClass: "drag-ghost",
    chosenClass: "sortable-chosen",
    dragClass: "drag-dragging",

    onEnd: function () {
        updateRanks();   // 👈 update numbers after drag
    }

});</script>

<script>
function saveRanking() {
    const items = document.querySelectorAll("#song-list li");

    const ranking = Array.from(items).map(item =>
        parseInt(item.dataset.id)
    );

    fetch("/save-ranking", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ ranking: ranking })
    })
    .then(response => response.json())
    .then(data => {
        alert("Tallennettu!");
        console.log(data);
    })
    .catch(error => {
        console.error("Error:", error);
    });
}
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    updateRanks();   
    fetch("/get-ranking")
    .then(response => response.json())
    .then(data => {
        if (data.ranking && data.ranking.length > 0) {
            const songList = document.getElementById("song-list");
            const items = Array.from(songList.children);

            // Build a map of song id → li element
            const itemMap = {};
            items.forEach(item => {
                itemMap[item.dataset.id] = item;
            });

            // Append items in saved order
            data.ranking.forEach(id => {
                if (itemMap[id]) {
                    songList.appendChild(itemMap[id]);
                }
            });
	updateRanks();
        }
    })
    .catch(error => {
        console.error("Error loading ranking:", error);
    });
});
</script>

</body>
</html>
