<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ username }} tulokset</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url("/static/Taustakuva.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    text-align: center;
}

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
}

.container {
    width: 360px;
    margin: 20px auto;
}

.result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid black;
    padding: 10px;
    margin: 6px 0;
    background-color: #f9f9f9;
}

.result-item.gold { background: linear-gradient(to right, #ffd700, #f9f9f9); }
.result-item.silver { background: linear-gradient(to right, #c0c0c0, #f9f9f9); }
.result-item.bronze { background: linear-gradient(to right, #cd7f32, #f9f9f9); }
.result-item.top10_color { background: linear-gradient(to right, #d6ecff, #f9f9f9); }

.rank {
    width: 35px;
    text-align: right;
    font-weight: bold;
}

.flag {
    width: 30px;
    height: 20px;
}

.text {
    text-align: left;
}

.artist {
    font-weight: bold;
}

.title {
    font-size: 12px;
    color: #555;
}

.points {
    margin-left: auto;
    font-size: 22px;
    font-weight: bold;
}

.back-btn {
    margin-top: 20px;
    margin-bottom: 40px; 
    padding: 10px 20px;
font-size: 16px;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.1); /* adjust */
    z-index: -1;
}

</style>
</head>

<body>

<h2>{{ username }} pisteet</h2>

<div class="container">
    {% for song in results %}
    <div class="result-item
        {% if loop.index == 1 %}gold
        {% elif loop.index == 2 %}silver
        {% elif loop.index == 3 %}bronze
	{% elif loop.index >= 4 and loop.index <= 10 %}top10_color
        {% endif %}
    ">
        <div class="rank">{{ loop.index }}.</div>

        <img class="flag" src="/static/{{ song.country }}">

        <div class="text">
            <div class="artist">{{ song.artist }}</div>
            <div class="title">{{ song.title }}</div>
        </div>

        <div class="points">{{ song.points }}</div>
    </div>
    {% endfor %}
</div>

<button class="back-btn" onclick="window.location.href='/app'">
    ← Takaisin
</button>

</body>
</html>
