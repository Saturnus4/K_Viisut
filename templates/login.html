<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kirjaudu</title>
    <style>


body {
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 22px;
}

h2 {
    font-size: 1.8em;
}

input {
    font-size: 1em;
    padding: 8px;
    margin: 10px;
}

button {
    font-size: 1em;
    padding: 8px 16px;
    cursor: pointer;
}


    </style>
</head>

<body>

<h2>Kirjoita salasana</h2>

<form method="POST">
    <input type="password" name="password" required>
    <button type="submit">Enter</button>
</form>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<p>Versio 1.4</p>

</body>
</html>
